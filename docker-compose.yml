services:
  postgres:
    image: postgres:15
    container_name: elparche-wallet-postgres
    environment:
      POSTGRES_DB: walletdb
      POSTGRES_USER: elparche
      POSTGRES_PASSWORD: elparche123
    ports:
      - "5433:5432"
    volumes:
      - wallet_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: elparche-wallet-redis
    ports:
      - "6380:6379"

volumes:
  wallet_postgres_data: