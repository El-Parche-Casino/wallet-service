name: Build y push de imagen Docker

on:
  push:
    branches: [main]

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir la imagen
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/wallet-service:latest .

      - name: Publicar la imagen
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/wallet-service:latest
